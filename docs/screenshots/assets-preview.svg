      .note { font-size: 16px; fill: #8eb5bf; }
      .panel { fill: url(#panel); stroke: #2b6680; stroke-width: 2; rx: 16; }
      .amber { fill: #ffb24a; }
      .cyan { fill: #56e6ff; }
      .green { fill: #79ffb2; }
      .magenta { fill: #ff5cff; }
      .ink { fill: #071018; }
      .line { stroke: #46d9ff; stroke-width: 3; fill: none; }
      .warn { stroke: #ffb24a; stroke-width: 4; fill: none; }
    </style>
  </defs>

