      <stop offset="1" stop-color="#10141d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173446"/>
      <stop offset="1" stop-color="#0c1a25"/>
